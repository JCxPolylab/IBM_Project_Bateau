side contact mm = 140
speed straight pct = 40
speed approach pct = 28
speed arc pct = 24
speed counter pct = 28
speed return pct = 40
speed backup pct = 18
speed search pct = 24
clockwise turn = true
use gyro heading = true
heading kp = 0.45
max heading correction deg = 18
heading deadband deg = 3
return heading tolerance deg = 18
fallback marker sec = 8
min home detect sec = 6
min return travel sec = 2
home confirm cycles = 3
