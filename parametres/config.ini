loop sleep ms = 60
log period ms = 1000
heartbeat period ms = 1000
marker approach mm = 1600
marker capture mm = 950
marker too close mm = 420
home detect mm = 420
straight wall balance mm = 220
straight heading correction deg = 6
arc turn deg = 34
arc tight turn deg = 48
counter turn deg = 14
search turn deg = 12
