[GENERAL]
; Modes possibles : camera, calibration, lidar, ramassage, labyrinthe, course, mesure, debug
programme mode = ramassage
debug flag = true
nombres balles bonnes = 0
nombres balles mauvaises = 0

[CAMERA]
reference = 
device = 0
width = 320
height = 240
fps = 20
Aifps = 5
calibration file = parametres/calibration/calibration.txt
echiquier size = 8 , 6
nombres de prise pour la calibration = 50
square size = 2.6
recording file path = parametres/video/
flag recording = false
show image = false
; backend = csi pour camera nappe, usb pour camera USB
backend = csi
csi pipeline =
; Detection IA
non maximum suppression threshold = 0.35
score threshold = 0.05
; Couleurs reconnues : red/rouge, orange, white/blanc/blanche, blue/bleu
; Adapter ces deux lignes selon la couleur positive du concours.
; Exemple si la balle blanche est la cible : target color = white et score pingpong white = 10.
target color = red
ignore color = orange
hardware focale = 0.5
video codec = MJPG
video ext = avi

[IA]
ONNX model path = parametres/Training_Model/exp.onnx

[MOTHERBOARD]
enabled = true
port = /dev/serial0
baudrate = 115200
read timeout ms = 20
write timeout ms = 50
status timeout ms = 10
; Trames retour supportees cote Raspberry :
; SCORE <valeur>, DELTA <valeur>, BALLE RED/ORANGE/WHITE/OTHER/SCORE/TRASH,
; GYRO <deg>, HEADING <deg>, STATUS score=<v> heading=<deg> balle=<type>
; Commande finale envoyee par la Raspberry : LOCK_COLLECTOR

[LIDAR]
enabled = true
port = /dev/ttyUSB0
baudrate = 460800
mock = false
max distance mm = 8000
front half angle deg = 20
lateral half angle deg = 50
avoid distance mm = 650
web max points = 180
reference = ""

[RAMASSAGE]
duration sec = 300
return reserve sec = 30
predicted score = 100
loop sleep ms = 60
log period ms = 1000
heartbeat period ms = 1000
search speed pct = 24
track speed pct = 40
approach speed pct = 28
avoid speed pct = 26
return speed pct = 20
search turn deg = 14
avoid turn deg = 28
target turn clamp deg = 35
target turn deadband deg = 3
approach distance m = 0.75
rear pontoon detect mm = 300
rear slowdown mm = 700
front avoid mm = 650
search flip ms = 1200
ball min confidence = 0.50
ball min distance m = 0.10
ball max distance m = 6.00
ball orange diameter m = 0.040
ball white diameter m = 0.040
ball piscine diameter m = 0.070
camera hfov deg = 62.2
white is pingpong = true
collect fast distance m = 0.50
catch angle gate deg = 18
catch only positive targets = true
anti rebond ms = 1500
conveyor normal pct = 80
conveyor rapide pct = 100
score base collecte = 20
score bonus ponton = 100
score bonus afficheur = 50
score generic positive = 10
score generic trash = -10
score pingpong orange = -5
score pingpong white = -5  ; mettre 10 si la balle blanche est le dechet a collecter
score piscine red = 10
score piscine other = -10

[LABYRINTHE]
